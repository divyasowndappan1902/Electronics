<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - Electronic Store</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <a href="index.html" class="sidebar-logo" style="display:block; text-decoration:none;"><img src="logo.webp" alt="STACKLY Logo" class="logo-img"></a>
      <nav class="sidebar-nav">
        <a href="customer_dashboard.html">👤 My Account</a>
        <a href="order-history.html">📦 Order History</a>
        <a href="wishlist.html">❤️ Wishlist</a>
        <a href="saved-addresses.html">📍 Saved Addresses</a>
        <a href="payment-methods.html">💳 Payment Methods</a>
        <a href="account-settings.html">⚙️ Account Settings</a>
      </nav>
      <div style="padding: 2rem; border-top: 1px solid #eaeaea;">
        <a href="login.html" style="color: var(--text-light); display: flex; align-items: center; gap: 0.5rem; font-weight: 500;">🚪 Logout</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <!-- Topbar -->
      <header class="dashboard-topbar">
        <div class="mobile-sidebar-toggle" style="display: none;">☰</div>
        <div class="topbar-search">
          <input type="text" placeholder="Search your orders...">
        </div>
        <div class="topbar-profile">
          <div style="font-size: 1.5rem; cursor: pointer;">🔔 <span style="font-size: 0.8rem; background: var(--primary-color); color: white; border-radius: 50%; padding: 2px 6px; position: relative; top: -10px; left: -10px;">3</span></div>
          <div style="font-size: 1.5rem; cursor: pointer;" onclick="window.location.href='404.html'">💬</div>
          <!-- Unique Role Indicator -->
          <span id="userEmailDisplay" style="margin-right: 15px; font-weight: 500; color: var(--text-dark);"></span>
          <div class="role-badge badge-customer">Customer</div>
          <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=100&q=80" alt="Customer" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer;">
        </div>
      </header>

      <!-- Dashboard Content -->
      <div class="dashboard-content">
        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">My Wishlist</h2>
            <p style="color: var(--text-light);">Items you've saved to purchase later.</p>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem;">
          <!-- Wishlist Item 1 -->
          <div class="product-card" style="background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: transform 0.3s; position: relative;">
            <div style="position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.9); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-color); cursor: pointer; z-index: 10;">
              ✕
            </div>
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80" alt="Headphones" style="width: 100%; height: 200px; object-fit: cover;">
            <div style="padding: 1.5rem;">
              <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text-dark);">Premium Wireless Headphones</h3>
              <div style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1.5rem;">$299.99</div>
              <button class="btn" style="width: 100%;" onclick="window.location.href='404.html'">Add to Cart</button>
            </div>
          </div>
          
          <!-- Wishlist Item 2 -->
          <div class="product-card" style="background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: transform 0.3s; position: relative;">
            <div style="position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.9); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-color); cursor: pointer; z-index: 10;">
              ✕
            </div>
            <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=500&q=80" alt="Camera" style="width: 100%; height: 200px; object-fit: cover;">
            <div style="padding: 1.5rem;">
              <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text-dark);">Polaroid Instant Camera</h3>
              <div style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1.5rem;">$129.99</div>
              <button class="btn" style="width: 100%;" onclick="window.location.href='404.html'">Add to Cart</button>
            </div>
          </div>

          <!-- Wishlist Item 3 -->
          <div class="product-card" style="background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: transform 0.3s; position: relative;">
            <div style="position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.9); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-color); cursor: pointer; z-index: 10;">
              ✕
            </div>
            <img src="https://images.unsplash.com/photo-1583394838336-acd977736f90?w=500&q=80" alt="Headphones" style="width: 100%; height: 200px; object-fit: cover;">
            <div style="padding: 1.5rem;">
              <h3 style="font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text-dark);">True Wireless Earbuds</h3>
              <div style="font-size: 1.25rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1.5rem;">$159.00</div>
              <button class="btn" style="width: 100%;" onclick="window.location.href='404.html'">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const email = localStorage.getItem('userEmail') || 'user@example.com';
      const emailDisplay = document.getElementById('userEmailDisplay');
      if (emailDisplay) {
        emailDisplay.textContent = email;
      }
    });
  </script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Main Navbar Toggle
    const mobileBtn = document.querySelector('.mobile-menu-btn');
    const navLinks = document.querySelector('.nav-links');
    if (mobileBtn && navLinks) {
      mobileBtn.addEventListener('click', () => {
        navLinks.classList.toggle('nav-active');
      });
    }

    // Dashboard Sidebar Toggle
    const sidebarToggle = document.querySelector('.mobile-sidebar-toggle');
    const sidebar = document.querySelector('.dashboard-sidebar');
    if (sidebarToggle && sidebar) {
      sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('active');
      });
    }
  });
</script>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const elements = document.querySelectorAll('.product-card, .section-title, .hero, .flash-sale-banner, .brands-marquee, .feature-card, .blog-post, .split-left, .split-right, .login-glass-card, .auth-form, .stat-card, .dashboard-card, .chart-container, .contact-info, .contact-form, .faq-item, .collection-card, .cart-item, .order-card, .address-card, .payment-card, .shop-sidebar, .shop-main, .account-sidebar, .account-content, .settings-section, .error-content');
      elements.forEach(el => {
        if (!el.hasAttribute('data-aos')) {
          el.setAttribute('data-aos', 'fade-up');
          el.setAttribute('data-aos-duration', '800');
        }
      });
      if (typeof AOS !== 'undefined') {
        AOS.init({ once: true });
      }
    });
  </script>
</body>
</html>
