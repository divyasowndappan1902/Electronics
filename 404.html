<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--primary-color);
      line-height: 1;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }
    .error-title {
      font-size: 2.5rem;
      color: var(--text-dark);
      margin-bottom: 1rem;
      animation: fadeIn 1s ease-out forwards;
      opacity: 0;
      animation-delay: 0.3s;
    }
    .error-desc {
      font-size: 1.2rem;
      color: var(--text-light);
      max-width: 500px;
      margin-bottom: 2rem;
      animation: fadeIn 1s ease-out forwards;
      opacity: 0;
      animation-delay: 0.5s;
    }
    .error-buttons {
      display: flex; 
      gap: 1rem; 
      justify-content: center;
      animation: fadeIn 1s ease-out forwards;
      opacity: 0;
      animation-delay: 0.7s;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  
  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="logo"><img src="logo.webp" alt="STACKLY Logo" class="logo-img"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="collection.html">Collection</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
    <div class="nav-icons">
      <div class="mobile-menu-btn">☰</div>
    </div>
  </nav>

  <!-- 404 Content -->
  <div class="container error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Oops! Page Not Found</h1>
    <p class="error-desc">We can't seem to find the page you're looking for. It might have been removed, renamed, or temporarily unavailable.</p>
    <div class="error-buttons">
      <button onclick="window.history.back()" class="btn" style="background-color: transparent; border: 2px solid var(--primary-color); color: var(--primary-color);">Go Back</button>
      <a href="index.html" class="btn">Return to Home</a>
    </div>
  </div>


<script>
  document.addEventListener('DOMContentLoaded', () => {

    // Dashboard Sidebar Toggle
    const sidebarToggle = document.querySelector('.mobile-sidebar-toggle');
    const sidebar = document.querySelector('.dashboard-sidebar');
    if (sidebarToggle && sidebar) {
      sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('active');
      });
    }
  });
</script>

  <script src="script.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const elements = document.querySelectorAll('.product-card, .section-title, .hero, .flash-sale-banner, .brands-marquee, .feature-card, .blog-post, .split-left, .split-right, .login-glass-card, .auth-form, .stat-card, .dashboard-card, .chart-container, .contact-info, .contact-form, .faq-item, .collection-card, .cart-item, .order-card, .address-card, .payment-card, .shop-sidebar, .shop-main, .account-sidebar, .account-content, .settings-section, .error-content');
      elements.forEach(el => {
        if (!el.hasAttribute('data-aos')) {
          el.setAttribute('data-aos', 'fade-up');
          el.setAttribute('data-aos-duration', '800');
        }
      });
      if (typeof AOS !== 'undefined') {
        AOS.init({ once: true });
      }
    });
  </script>
</body>
</html>
