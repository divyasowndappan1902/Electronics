<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Electronic Store</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  
  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
      <a href="index.html" class="sidebar-logo" style="display:block; text-decoration:none;"><img src="logo.webp" alt="STACKLY Logo" class="logo-img"></a>
      <nav class="sidebar-nav">
        <a href="admin_dashboard.html">📊 Dashboard</a>
        <a href="admin-orders.html">📦 Orders</a>
        <a href="admin-products.html">🏷️ Products</a>
        <a href="admin-customers.html">👥 Customers</a>
        <a href="admin-analytics.html">📈 Analytics</a>
        <a href="admin-settings.html">⚙️ Settings</a>
      </nav>
      <div style="padding: 2rem; border-top: 1px solid #eaeaea;">
        <a href="login.html" style="color: var(--text-light); display: flex; align-items: center; gap: 0.5rem; font-weight: 500;">🚪 Logout</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <!-- Topbar -->
      <header class="dashboard-topbar">
        <div class="mobile-sidebar-toggle" style="display: none;">☰</div>
        <div class="topbar-search">
          <input type="text" placeholder="Search orders, customers, or products...">
        </div>
        <div class="topbar-profile">
          <div style="font-size: 1.5rem; cursor: pointer;" onclick="window.location.href='404.html'">🔔 <span style="font-size: 0.8rem; background: var(--primary-color); color: white; border-radius: 50%; padding: 2px 6px; position: relative; top: -10px; left: -10px;">12</span></div>
          <!-- Unique Role Indicator -->
          <span id="userEmailDisplay" style="margin-right: 15px; font-weight: 500; color: var(--text-dark);"></span>
          <div class="role-badge badge-admin">Admin</div>
          <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&q=80" alt="Admin" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer;">
        </div>
      </header>

      <!-- Dashboard Content -->
      <div class="dashboard-content">
        <div style="margin-bottom: 2rem;">
          <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Store Settings</h2>
          <p style="color: var(--text-light);">Configure your store's general preferences and policies.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;">
          <!-- General Info -->
          <div style="background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
            <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; border-bottom: 1px solid #eaeaea; padding-bottom: 1rem;">General Details</h3>
            <form>
              <div class="form-group" style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Store Name</label>
                <input type="text" value="Electronic Store" style="width: 100%; padding: 12px; border: 1px solid #eaeaea; border-radius: 8px;">
              </div>
              <div class="form-group" style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Store Contact Email</label>
                <input type="email" value="support@electronicstore.com" style="width: 100%; padding: 12px; border: 1px solid #eaeaea; border-radius: 8px;">
              </div>
              <div class="form-group" style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Store Description</label>
                <textarea rows="4" style="width: 100%; padding: 12px; border: 1px solid #eaeaea; border-radius: 8px; font-family: inherit;">The best place for premium electronics and gadgets.</textarea>
              </div>
              <button class="btn" type="button" onclick="window.location.href='404.html'">Save General Info</button>
            </form>
          </div>

          <!-- Currency & Tax -->
          <div style="background: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
            <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; border-bottom: 1px solid #eaeaea; padding-bottom: 1rem;">Regional & Tax</h3>
            <form>
              <div class="form-group" style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Store Currency</label>
                <select style="width: 100%; padding: 12px; border: 1px solid #eaeaea; border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none;">
                  <option selected>USD ($)</option>
                  <option>EUR (€)</option>
                  <option>GBP (Â£)</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Default Tax Rate (%)</label>
                <input type="number" value="8.5" style="width: 100%; padding: 12px; border: 1px solid #eaeaea; border-radius: 8px;">
              </div>
              
              <h4 style="font-size: 1rem; margin-top: 1.5rem; margin-bottom: 1rem;">Maintenance Mode</h4>
              <label style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; cursor: pointer;">
                <input type="checkbox" style="width: 20px; height: 20px;">
                <span>Temporarily disable storefront</span>
              </label>
              
              <button class="btn" type="button" style="background: var(--text-dark);" onclick="window.location.href='404.html'">Update Settings</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="script.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const email = localStorage.getItem('userEmail') || 'user@example.com';
      const emailDisplay = document.getElementById('userEmailDisplay');
      if (emailDisplay) {
        emailDisplay.textContent = email;
      }
    });
  </script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Main Navbar Toggle
    const mobileBtn = document.querySelector('.mobile-menu-btn');
    const navLinks = document.querySelector('.nav-links');
    if (mobileBtn && navLinks) {
      mobileBtn.addEventListener('click', () => {
        navLinks.classList.toggle('nav-active');
      });
    }

    // Dashboard Sidebar Toggle
    const sidebarToggle = document.querySelector('.mobile-sidebar-toggle');
    const sidebar = document.querySelector('.dashboard-sidebar');
    if (sidebarToggle && sidebar) {
      sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('active');
      });
    }
  });
</script>
</body>
</html>
